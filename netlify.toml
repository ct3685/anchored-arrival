[build]
  command = "pnpm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "24"

# Next.js runtime handles routing automatically

# Redirect Netlify default domain to ranchsquad.com
[[redirects]]
  from = "https://trevor-ranchsquad.netlify.app/*"
  to = "https://ranchsquad.com/:splat"
  status = 301
  force = true

# Redirect for /join to TikTok
[[redirects]]
  from = "/join"
  to = "https://www.tiktok.com/t/ZTh1ohJwM/"
  status = 301